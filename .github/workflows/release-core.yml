name: Reusable Marble Kernel Release

on:
  workflow_call:
    inputs:
      flash_artifact_name:
        required: true
        type: string
      artifact_label:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download flashable artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.flash_artifact_name }}
          path: release

      - name: Create draft release
        run: |
          source release/zip-name.env
          tag="marble-${{ inputs.artifact_label }}-r${GITHUB_RUN_NUMBER}"
          gh release create "${tag}" \
            release/*.zip \
            release/*.sha256 \
            release/build-info.txt \
            release/build-info.json \
            --draft \
            --title "${tag}" \
            --notes-file release/summary.md
