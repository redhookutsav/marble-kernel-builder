name: Build Marble Kernel (Matrix)

# Run multiple managers in parallel in a single workflow trigger.
# Select any combination of managers and SUSFS options — all run as
# independent parallel jobs and upload separate artifacts.

on:
  workflow_dispatch:
    inputs:
      # ── Manager selection ─────────────────────────────────────────
      build_none:
        description: "Build: none (baseline no-root)"
        type: boolean
        default: false
      build_kernelsu:
        description: "Build: KernelSU (no SUSFS)"
        type: boolean
        default: false
      build_kernelsu_next:
        description: "Build: KernelSU-Next"
        type: boolean
        default: false
      build_sukisu_ultra:
        description: "Build: SukiSU Ultra"
        type: boolean
        default: false
      build_resukisu:
        description: "Build: ReSukiSU"
        type: boolean
        default: false
      # ── SUSFS options ─────────────────────────────────────────────
      enable_susfs:
        description: "Enable SUSFS (applies to KSUNext, SukiSU Ultra, ReSukiSU)"
        type: boolean
        default: false
      susfs_version:
        description: SUSFS preset version
        type: choice
        default: v2.2.0
        options:
          - v2.2.0
          - v2.1.0
          - custom
      susfs_ref:
        description: "SUSFS branch/tag/commit (only for custom version)"
        required: false
        default: ""
      # ── Source ────────────────────────────────────────────────────
      source_repo:
        description: Kernel source repository
        required: true
        default: mohdakil2426/android_kernel_xiaomi_marble
      source_ref:
        description: Kernel source branch, tag, or commit
        required: true
        default: melt-rebase
      # ── Build options ─────────────────────────────────────────────
      build_scope:
        description: Build target set
        type: choice
        default: image-only
        options:
          - image-only
          - full
      enable_ccache:
        description: Enable ccache
        type: boolean
        default: true
      debug_artifacts:
        description: Upload debug artifacts on successful builds
        type: boolean
        default: false
      make_release:
        description: Create a draft GitHub release per successful build
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

jobs:
  # ── Job 1: Generate the build matrix from the checkbox inputs ────
  setup:
    name: Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: gen
        run: |
          include=()

          # none — SUSFS is always false for baseline builds
          if [[ "${{ inputs.build_none }}" == "true" ]]; then
            include+=('{"manager":"none","enable_susfs":"false","label":"none"}')
          fi

          # KernelSU — SUSFS not supported by policy; always false
          if [[ "${{ inputs.build_kernelsu }}" == "true" ]]; then
            include+=('{"manager":"kernelsu","enable_susfs":"false","label":"kernelsu"}')
          fi

          # KernelSU-Next — SUSFS optional
          if [[ "${{ inputs.build_kernelsu_next }}" == "true" ]]; then
            if [[ "${{ inputs.enable_susfs }}" == "true" ]]; then
              include+=('{"manager":"kernelsu-next","enable_susfs":"true","label":"kernelsu-next-susfs"}')
            else
              include+=('{"manager":"kernelsu-next","enable_susfs":"false","label":"kernelsu-next"}')
            fi
          fi

          # SukiSU Ultra — SUSFS optional
          if [[ "${{ inputs.build_sukisu_ultra }}" == "true" ]]; then
            if [[ "${{ inputs.enable_susfs }}" == "true" ]]; then
              include+=('{"manager":"sukisu-ultra","enable_susfs":"true","label":"sukisu-ultra-susfs"}')
            else
              include+=('{"manager":"sukisu-ultra","enable_susfs":"false","label":"sukisu-ultra"}')
            fi
          fi

          # ReSukiSU — SUSFS optional
          if [[ "${{ inputs.build_resukisu }}" == "true" ]]; then
            if [[ "${{ inputs.enable_susfs }}" == "true" ]]; then
              include+=('{"manager":"resukisu","enable_susfs":"true","label":"resukisu-susfs"}')
            else
              include+=('{"manager":"resukisu","enable_susfs":"false","label":"resukisu"}')
            fi
          fi

          if [[ ${#include[@]} -eq 0 ]]; then
            echo "::error::No managers selected. Enable at least one build_* checkbox."
            exit 1
          fi

          joined=$(printf '%s,' "${include[@]}")
          joined="${joined%,}"
          matrix="{\"include\":[${joined}]}"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: ${matrix}"

  # ── Job 2: Build — runs once per matrix entry in parallel ────────
  build:
    name: "${{ matrix.label }}"
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false   # one failure does not cancel sibling builds

    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_REF:  ${{ inputs.source_ref }}
      MANAGER:     ${{ matrix.manager }}
      MANAGER_REF: ""
      ENABLE_SUSFS: ${{ matrix.enable_susfs }}
      SUSFS_VERSION: ${{ inputs.susfs_version }}
      SUSFS_KERNEL_BRANCH: gki-android12-5.10
      SUSFS_REF:  ${{ inputs.susfs_ref }}
      SUSFS_EXPECTED_VERSION: ""
      BUILD_SCOPE: ${{ inputs.build_scope }}
      KERNEL_DIR:  kernel-source
      CCACHE_DIR:  /home/runner/.ccache
      ANDROID_CLANG_BIN: ${{ github.workspace }}/android-clang/clang-r416183b/bin

    steps:
      - name: Checkout builder
        uses: actions/checkout@v4
        with:
          path: builder

      - name: Prepare builder workspace
        run: rsync -a builder/ ./

      - name: Validate builder policy
        run: |
          for test_script in tests/test-*.sh; do
            env -u SOURCE_REPO -u SOURCE_REF -u MANAGER -u MANAGER_REF -u ENABLE_SUSFS \
              -u SUSFS_VERSION -u SUSFS_KERNEL_BRANCH -u SUSFS_REF -u SUSFS_EXPECTED_VERSION \
              bash "${test_script}"
          done

      - name: Validate inputs
        run: bash scripts/validate-inputs.sh

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: kernel-source
          fetch-depth: 1

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache cpio curl flex git jq kmod libelf-dev \
            libncurses-dev libssl-dev lld llvm clang file python3 python-is-python3 \
            rsync unzip zip zstd

      - name: Restore Android kernel clang
        id: android-clang-cache
        uses: actions/cache@v4
        with:
          path: android-clang
          key: marble-builder-android-clang-clang-r416183b

      - name: Fetch Android kernel clang
        run: |
          source config/marble.env
          if [[ -x "${ANDROID_CLANG_BIN}/clang" ]]; then
            "${ANDROID_CLANG_BIN}/clang" --version
            exit 0
          fi
          mkdir -p "android-clang/${ANDROID_CLANG_VERSION}"
          curl -fsSL "${ANDROID_CLANG_ARCHIVE_URL}" | tar -xz -C "android-clang/${ANDROID_CLANG_VERSION}"
          test -x "${ANDROID_CLANG_BIN}/clang"
          "${ANDROID_CLANG_BIN}/clang" --version

      - name: Restore ccache
        id: ccache-restore
        if: ${{ inputs.enable_ccache }}
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: marble-builder-ccache-${{ runner.os }}-${{ inputs.source_ref }}-${{ matrix.manager }}-${{ matrix.enable_susfs }}-${{ inputs.susfs_version }}-${{ inputs.build_scope }}
          restore-keys: |
            marble-builder-ccache-${{ runner.os }}-${{ inputs.source_ref }}-${{ matrix.manager }}-
            marble-builder-ccache-${{ runner.os }}-${{ inputs.source_ref }}-
            marble-builder-ccache-${{ runner.os }}-

      - name: Resolve refs
        run: bash scripts/resolve-refs.sh

      - name: Apply manager
        run: bash scripts/patch-manager.sh

      - name: Read manager version
        run: bash scripts/read-manager-version.sh

      - name: Apply SUSFS
        run: bash scripts/apply-susfs.sh

      - name: Build kernel
        run: bash scripts/build-kernel.sh

      - name: Package AnyKernel3 zip
        run: bash scripts/package-anykernel.sh

      - name: Copy metadata into release
        run: |
          cp release/resolved-refs.env kernel-source/release/resolved-refs.env
          {
            echo "source_repo=${SOURCE_REPO}"
            echo "source_ref=${SOURCE_REF}"
            echo "source_commit=$(git -C kernel-source rev-parse HEAD)"
            echo "workflow_run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            cat kernel-source/release/resolved-refs.env
          } > kernel-source/release/build-info.txt

      - name: Audit flashable zip
        run: bash scripts/audit-flashable-zip.sh

      - name: Generate build summary
        run: |
          bash scripts/generate-build-summary.sh
          cat kernel-source/release/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload flashable artifact
        uses: actions/upload-artifact@v4
        with:
          name: marble-${{ matrix.label }}-${{ inputs.build_scope }}-r${{ github.run_number }}
          if-no-files-found: error
          path: |
            kernel-source/release/*.zip
            kernel-source/release/*.zip.sha256
            kernel-source/release/build-info.txt
            kernel-source/release/summary.md
            kernel-source/release/zip-audit.txt
            kernel-source/release/ccache-stats.txt

      - name: Upload debug artifacts
        if: ${{ !cancelled() && (inputs.debug_artifacts || failure()) }}
        uses: actions/upload-artifact@v4
        with:
          name: marble-debug-${{ matrix.label }}-${{ inputs.build_scope }}-r${{ github.run_number }}
          if-no-files-found: warn
          path: |
            kernel-source/release/Image
            kernel-source/release/System.map
            kernel-source/release/vmlinux
            kernel-source/release/dtbs.tar.gz
            kernel-source/release/modules.tar.gz
            kernel-source/release/build.log

      - name: Save ccache
        if: ${{ inputs.enable_ccache && success() && steps.ccache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Create draft release
        if: ${{ inputs.make_release && success() }}
        run: |
          source kernel-source/release/zip-name.env
          tag="marble-${{ matrix.label }}-r${GITHUB_RUN_NUMBER}"
          gh release create "${tag}" \
            kernel-source/release/*.zip \
            kernel-source/release/*.sha256 \
            kernel-source/release/build-info.txt \
            --draft \
            --title "${tag}" \
            --notes-file kernel-source/release/summary.md
